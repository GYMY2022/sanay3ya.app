<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تحميل تطبيق صنايعية</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1A6DFF, #0047CC);
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 400px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.15);
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px auto;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    p {
      font-size: 16px;
      opacity: 0.85;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: white;
      color: #1A6DFF;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: scale(1.05);
    }
    .btn-secondary {
      display: inline-block;
      background: transparent;
      color: white;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      border: 2px solid rgba(255,255,255,0.4);
      margin-top: 12px;
    }
    .note {
      margin-top: 20px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="icon">🔧</div>
  <h1>مرحباً بك في صنايعية</h1>
  <p>جاري فتح التطبيق... إذا لم يفتح تلقائياً، اضغط على الزر أدناه.</p>

  <a href="snae3ya://r/SNY34852" class="btn">📱 فتح التطبيق</a>
  <br />
  <a href="https://play.google.com/store/apps/details?id=com.sani3ia.app" class="btn-secondary">📥 تحميل التطبيق</a>

  <p class="note">إذا كنت تستخدم هاتفاً، اضغط على "فتح التطبيق" ليتم نقلك مباشرة.</p>
</div>

<script>
  (function() {
    // استخراج الكود من الرابط الحالي
    var path = window.location.pathname; // مثلاً /r/SNY34852
    var code = path.split('/').pop();    // استخراج SNY34852

    // محاولة فتح التطبيق بالكود المستخرج
    setTimeout(function() {
      window.location.href = 'snae3ya://r/' + code;
    }, 500);

    setTimeout(function() {
      window.location.href = 'https://play.google.com/store/apps/details?id=com.sani3ia.app';
    }, 3500);
  })();
</script>

</body>
</html>
