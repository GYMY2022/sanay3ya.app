<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sanay3ya.app</title>
  <script>
    // استقبل المسار المحفوظ من 404.html وأعد توجيه الـ deep link
    (function() {
      const params = new URLSearchParams(window.location.search);
      const redirectPath = params.get('p');
      if (redirectPath && redirectPath.startsWith('/')) {
        // استخدم الـ custom scheme عشان تفتح التطبيق بالمسار الصحيح
        window.location.href = 'snae3ya://' + redirectPath;
      }
    })();
  </script>
</head>
<body>
  <h1>sanay3ya.app</h1>
  <p>جاري فتح التطبيق...</p>
  <script>
    // لو الـ deep link فوق مجحش، حاول تاني بعد 2 ثانية
    setTimeout(function() {
      window.location.href = 'https://play.google.com/store/apps/details?id=com.sani3ia.app';
    }, 2000);
  </script>
</body>
</html>
